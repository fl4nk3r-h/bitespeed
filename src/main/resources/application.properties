# Application Properties for Bitespeed
spring.application.name=bitespeed

# ================================
# Database Configuration
# Set these as environment variables in production (Render.com)
# ================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/bitespeed}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ================================
# Server
# ================================
server.port=${PORT:8080}

# ================================
# Logging
# ================================
logging.level.com.bitespeed=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
